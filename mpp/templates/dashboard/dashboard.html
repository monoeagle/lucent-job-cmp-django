{% extends "base.html" %}
{% block title %}Dashboard{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-6">Dashboard</h1>
<div class="stats shadow">
  <div class="stat">
    <div class="stat-title">Willkommen</div>
    <div class="stat-value text-primary">{{ user.username }}</div>
    <div class="stat-desc">Rolle: {{ user.role }}</div>
  </div>
  <div class="stat">
    <div class="stat-title">Bestellungen</div>
    <div class="stat-value">{{ order_count }}</div>
    <div class="stat-desc">Eigene Bestellungen</div>
  </div>
  <div class="stat">
    <div class="stat-title">Benachrichtigungen</div>
    <div class="stat-value">{{ unread_notifications }}</div>
    <div class="stat-desc">Ungelesen</div>
  </div>
</div>
{% endblock %}
