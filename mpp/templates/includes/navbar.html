<div class="navbar bg-primary text-primary-content">
  <div class="flex-none lg:hidden">
    <label for="sidebar-toggle" class="btn btn-square btn-ghost">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" class="inline-block w-6 h-6 stroke-current">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
      </svg>
    </label>
  </div>
  <div class="flex-1">
    <a href="/" class="btn btn-ghost text-xl">MPP Django</a>
  </div>
  <div class="flex-none">
    {% if user.is_authenticated %}
      <span class="mr-4">{{ user.username }} ({{ user.role }})</span>
      <a href="{% url 'account_logout' %}" class="btn btn-ghost btn-sm">Logout</a>
    {% else %}
      <a href="{% url 'account_login' %}" class="btn btn-ghost btn-sm">Login</a>
    {% endif %}
  </div>
</div>
